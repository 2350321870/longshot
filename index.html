<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>射击龙 - RogueLike</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .hidden {
            display: none !important;
        }
        
        body {
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #gameCanvas {
            display: block;
        }
        
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #uiLayer > * {
            pointer-events: auto;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 15px 15px;
            z-index: 100;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            border-radius: 20px;
            padding: 6px 12px;
        }
        
        .resource-icon {
            font-size: 18px;
        }
        
        .resource-value {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        
        .resource-divider {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(50, 50, 60, 0.95);
            border-top: 3px solid #444;
            z-index: 200;
        }
        
        .nav-item {
            flex: 1;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border-top: 3px solid transparent;
        }
        
        .nav-item.active {
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.2), transparent);
            border-top-color: #ffd700;
        }
        
        .nav-icon {
            font-size: 28px;
            margin-bottom: 3px;
        }
        
        .nav-label {
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }

        .main-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #4a90d9 0%, #2d5a8c 50%, #1a3a5c 100%);
            z-index: 150;
            overflow-y: auto;
            padding-bottom: 80px;
            display: none;
        }
        
        .main-screen.active {
            display: block;
        }

        .main-content {
            padding: 80px 20px 20px;
        }
        
        .chapter-title {
            text-align: center;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        
        .difficulty-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .difficulty-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .difficulty-text span {
            color: #44ff44;
        }
        
        .difficulty-btn {
            background: linear-gradient(180deg, #66ccff, #3399cc);
            border: 3px solid #fff;
            border-radius: 15px;
            padding: 8px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 15px;
        }
        
        .boss-status {
            text-align: center;
            font-size: 28px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .dragon-image-container {
            width: 80%;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .dragon-image {
            width: 100%;
            border-radius: 20px;
            border: 4px solid #333;
            background: linear-gradient(180deg, #2d5a8c 0%, #1a3a5c 100%);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        
        .dragon-placeholder {
            font-size: 80px;
        }

        .progress-rewards {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 0 auto 20px;
            max-width: 400px;
        }
        
        .progress-title {
            text-align: center;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .progress-bar-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .progress-markers {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: -25px;
            left: 0;
            right: 0;
        }
        
        .progress-marker {
            width: 3px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            position: relative;
        }
        
        .progress-marker::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .progress-rewards-items {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .reward-item {
            text-align: center;
        }
        
        .reward-egg {
            font-size: 40px;
            margin-bottom: 5px;
        }
        
        .reward-percent {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .start-btn-container {
            text-align: center;
            margin: 20px 0;
        }
        
        .start-game-btn {
            background: linear-gradient(180deg, #ffd700, #ff9900);
            border: 4px solid #cc7700;
            border-radius: 20px;
            padding: 15px 60px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
            transition: all 0.2s ease;
        }
        
        .start-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
        }
        
        .start-game-btn:active {
            transform: scale(0.98);
        }
        
        .start-cost {
            color: #fff;
            font-size: 16px;
            margin-top: 5px;
        }

        .section-title {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: left;
            padding-left: 5px;
            border-left: 4px solid #ffd700;
        }
        
        .level-select-section, .progress-rewards-section {
            margin-bottom: 25px;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .level-btn {
            background: linear-gradient(180deg, rgba(100, 100, 100, 0.6), rgba(60, 60, 60, 0.6));
            border: 2px solid #666;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .level-btn:hover:not(.locked) {
            transform: scale(1.02);
            border-color: #ffd700;
            background: linear-gradient(180deg, rgba(120, 120, 120, 0.6), rgba(80, 80, 80, 0.6));
        }
        
        .level-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            border-style: dashed;
        }
        
        .level-btn.current {
            border-color: #44ff44;
            background: linear-gradient(180deg, rgba(68, 255, 68, 0.2), rgba(60, 60, 60, 0.6));
        }
        
        .level-btn.completed {
            border-color: #44ccff;
        }
        
        .level-number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .level-btn.locked .level-number {
            color: #888;
        }
        
        .level-name {
            font-size: 13px;
            color: #fff;
        }
        
        .progress-rewards-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .reward-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #555;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.2s ease;
        }
        
        .reward-card.claimable {
            border-color: #44ff44;
            background: linear-gradient(90deg, rgba(68, 255, 68, 0.15), rgba(0, 0, 0, 0.4));
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(68, 255, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(68, 255, 68, 0); }
        }
        
        .reward-card.claimed {
            opacity: 0.6;
        }
        
        .reward-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .reward-icon {
            font-size: 32px;
        }
        
        .reward-details {
            display: flex;
            flex-direction: column;
        }
        
        .reward-name {
            color: #fff;
            font-size: 15px;
            font-weight: bold;
        }
        
        .reward-requirement {
            color: #aaa;
            font-size: 12px;
        }
        
        .reward-claim-btn {
            background: linear-gradient(180deg, #44ff44, #22cc22);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: #111;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .reward-claim-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 10px rgba(68, 255, 68, 0.5);
        }
        
        .reward-claim-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        .reward-claimed-text {
            color: #44ff44;
            font-size: 14px;
            font-weight: bold;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .character-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #555;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .character-card:hover:not(.locked) {
            transform: scale(1.02);
            border-color: #ffd700;
        }
        
        .character-card.selected {
            border-color: #44ff44;
            background: linear-gradient(180deg, rgba(68, 255, 68, 0.15), rgba(0, 0, 0, 0.4));
        }
        
        .character-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .character-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .character-name {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .character-desc {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .character-stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .character-stat {
            font-size: 11px;
        }
        
        .character-stat.positive {
            color: #44ff44;
        }
        
        .character-stat.negative {
            color: #ff4444;
        }
        
        .character-price {
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
        }
        
        .character-unlock-btn {
            background: linear-gradient(180deg, #ffd700, #cc9900);
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            color: #111;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: all 0.2s ease;
        }
        
        .character-unlock-btn:hover {
            transform: scale(1.05);
        }
        
        .shop-grid, .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .shop-item, .upgrade-item {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #555;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .shop-item:hover, .upgrade-item:hover {
            border-color: #ffd700;
        }
        
        .shop-icon, .upgrade-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        
        .shop-name, .upgrade-name {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .shop-desc, .upgrade-desc {
            color: #aaa;
            font-size: 11px;
            margin-bottom: 10px;
        }
        
        .shop-price, .upgrade-price {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .shop-price-icon, .upgrade-price-icon {
            font-size: 18px;
        }
        
        .shop-price-value, .upgrade-price-value {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
        }
        
        .shop-level, .upgrade-level {
            color: #44ff44;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .shop-buy-btn, .upgrade-btn {
            background: linear-gradient(180deg, #ffd700, #cc9900);
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            color: #111;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .shop-buy-btn:hover, .upgrade-btn:hover {
            transform: scale(1.05);
        }
        
        .shop-buy-btn:disabled, .upgrade-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        .equip-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .equip-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #555;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .equip-card.owned {
            border-color: #44ff44;
        }
        
        .equip-card-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        
        .equip-card-name {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .equip-card-level {
            color: #44ff44;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .equip-card-desc {
            color: #aaa;
            font-size: 11px;
            margin-bottom: 10px;
        }
        
        .equip-card-price {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .equip-card-price-value {
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
        }
        
        .equip-card-btn {
            background: linear-gradient(180deg, #ffd700, #cc9900);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: #111;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .equip-card-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .equip-card-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        .pause-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            padding: 6px 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .pause-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .battle-info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .battle-level {
            color: rgba(255, 215, 0, 0.85);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .battle-health {
            color: rgba(255, 100, 100, 0.9);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .battle-difficulty {
            display: none;
        }

        .skill-selection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            padding: 80px 20px 20px;
        }
        
        .skill-selection.show {
            display: flex;
        }
        
        .skill-title {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .skill-cards-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }
        
        .skill-card {
            display: flex;
            align-items: center;
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid transparent;
        }
        
        .skill-card:hover {
            transform: scale(1.02);
            border-color: #fff;
        }
        
        .skill-card.rarity-b {
            background: linear-gradient(135deg, #4488ff, #2266cc);
            border-color: #66aaff;
        }
        
        .skill-card.rarity-a {
            background: linear-gradient(135deg, #aa44ff, #8822cc);
            border-color: #cc66ff;
        }
        
        .skill-card.rarity-s {
            background: linear-gradient(135deg, #ff4488, #cc2266);
            border-color: #ff6699;
        }
        
        .skill-icon-box {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            position: relative;
        }
        
        .skill-icon {
            font-size: 40px;
        }
        
        .skill-rarity-badge {
            position: absolute;
            top: -8px;
            left: -8px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .skill-content {
            flex: 1;
        }
        
        .skill-name {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .skill-desc {
            color: rgba(255, 255, 255, 0.9);
            font-size: 22px;
            font-weight: bold;
        }
        
        .skill-desc span {
            color: #ffd700;
        }
        
        .skill-index {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .skill-subtitle {
            color: #88ff88;
            font-size: 14px;
            font-weight: bold;
        }
        
        .skill-refresh-section {
            margin-top: 30px;
            text-align: center;
        }
        
        .refresh-info {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .refresh-info .free {
            color: #44ff44;
            font-weight: bold;
        }
        
        .refresh-btn {
            background: linear-gradient(180deg, #44aaff, #2288dd);
            border: 4px solid #1166aa;
            border-radius: 15px;
            padding: 12px 40px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .refresh-icon {
            font-size: 24px;
        }

        .equipment-screen {
            padding: 80px 15px 100px;
        }
        
        .equipment-header {
            background: linear-gradient(180deg, #ffd700, #cc9900);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -15px -15px 20px;
        }
        
        .equipment-title {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .equipment-count {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .equipped-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

                <div class="chapter-title" id="chapterTitle">1. 屠龙第1章</div>
                
                <div class="level-select-section">
                    <div class="section-title">选择关卡</div>
                    <div class="level-grid" id="levelGrid">
                    </div>
                </div>
                
                <div class="progress-rewards-section">
                    <div class="section-title">关卡进度奖励</div>
                    <div class="progress-rewards-list" id="progressRewards">
                    </div>
                </div>
                
                <div class="start-btn-container">
                    <button class="start-game-btn" id="startGameBtn">开始挑战</button>
                    <div class="start-cost">⚡ x3</div>
                </div>
            </div>

            <div class="shop-screen hidden" id="shopTab">
                <div class="section-title">商店</div>
                <div class="shop-grid" id="shopGrid">
                </div>
                
                <div class="section-title" style="margin-top: 30px;">永久强化</div>
                <div class="upgrade-grid" id="upgradeGrid">
                </div>
            </div>

            <div class="character-screen hidden" id="characterTab">
                <div class="section-title">选择角色</div>
                <div class="character-grid" id="characterGrid">
                </div>
            </div>

            <div class="equipment-screen hidden" id="equipmentTab">
                <div class="equipment-header">
                    <div class="equipment-title">
                        <span class="nav-icon">⚔️</span>
                        装备强化
                    </div>
                </div>
                
                <div class="equip-grid" id="equipGrid">
                </div>
                
                <div class="equipment-header" style="margin-top: 20px;">
                    <div class="equipment-title">
                        <span class="nav-icon">🎒</span>
                        武器装备
                    </div>
                    <div class="equipment-count" id="equipCount">0/8</div>
                </div>
                
                <div class="equipped-grid" id="equippedGrid">
                </div>
                
                <div class="equipment-section-title">已解锁</div>
                <div class="unlocked-grid" id="unlockedGrid">
                </div>
                
                <div class="equipment-section-title">待解锁</div>
                <div class="unlocked-grid" id="lockedGrid">
                </div>
            </div>

            <div class="tasks-screen hidden" id="tasksTab">
                <div class="tasks-header">
                    <div class="section-title">每日任务</div>
                    <div class="tasks-refresh-info">
                        <span id="tasksRefreshTime">今日剩余: 00:00:00</span>
                    </div>
                </div>
                <div class="tasks-list" id="tasksList">
                </div>
            </div>

            <div class="achievements-screen hidden" id="achievementsTab">
                <div class="achievements-header">
                    <div class="section-title">成就系统</div>
                    <div class="achievements-stats">
                        <span class="achievement-points">🏆 成就点: <span id="totalAchievementPoints">0</span></span>
                        <span class="achievement-progress">解锁: <span id="unlockedAchievements">0</span>/<span id="totalAchievements">0</span></span>
                    </div>
                </div>
                <div class="achievements-tabs">
                    <button class="achievement-tab active" data-filter="all">全部</button>
                    <button class="achievement-tab" data-filter="unlocked">已解锁</button>
                    <button class="achievement-tab" data-filter="locked">未解锁</button>
                    <button class="achievement-tab" data-filter="stats">统计</button>
                </div>
                <div class="achievements-list" id="achievementsList">
                </div>
            </div>
        </div>

        <div class="skill-selection" id="skillSelection">
            <div class="skill-title">选择强化属性</div>
            <div class="skill-cards-container" id="skillCards">
            </div>
            <div class="skill-refresh-section">
                <div class="refresh-info">剩余免费<span class="free" id="freeRefreshCount">1</span>次</div>
                <button class="refresh-btn" id="refreshBtn">
                    <span class="refresh-icon">↻</span>
                    刷新
                </button>
            </div>
        </div>

        <div class="pause-menu" id="pauseMenu">
            <div class="pause-title">游戏暂停</div>
            <button class="pause-btn-item" id="resumeBtn">继续游戏</button>
            <button class="pause-btn-item return" id="returnFromPauseBtn">返回主界面</button>
        </div>

        <div class="level-complete-screen" id="levelUpScreen">
            <div class="complete-title">🎉 关卡完成！</div>
            <div class="complete-stats" id="levelupStats"></div>
            <div class="unlock-text" id="unlockText"></div>
            <div class="complete-buttons">
                <button class="complete-btn" id="nextLevelBtn">继续下一关</button>
                <button class="complete-btn return" id="returnMainBtn">返回主界面</button>
            </div>
        </div>

        <div class="game-over-screen" id="reviveScreen">
            <div class="gameover-title" style="color: #ffd700;">⚠️ 龙已到达终点</div>
            <div class="gameover-stats">
                <div>剩余复活次数: <span class="highlight" id="reviveCountDisplay">3</span></div>
            </div>
            <div class="gameover-buttons">
                <button class="gameover-btn" id="reviveBtn">✨ 复活</button>
                <button class="gameover-btn return" id="cancelReviveBtn">放弃</button>
            </div>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <div class="gameover-title">游戏结束</div>
            <div class="gameover-stats">
                <div>到达关卡: <span class="highlight" id="finalLevel">1</span></div>
                <div>获得金币: <span class="highlight" id="finalGold">0</span></div>
                <div>最终得分: <span class="highlight" id="finalScore">0</span></div>
            </div>
            <div class="gameover-buttons">
                <button class="gameover-btn" id="retryBtn">重新挑战</button>
                <button class="gameover-btn return" id="returnMainBtn2">返回主界面</button>
            </div>
        </div>

        <div class="achievement-notification" id="achievementNotification">
            <div class="achievement-notification-content">
                <div class="achievement-notification-icon" id="achievementNotifIcon">🏆</div>
                <div class="achievement-notification-text">
                    <div class="achievement-notification-title">成就解锁！</div>
                    <div class="achievement-notification-name" id="achievementNotifName">成就名称</div>
                    <div class="achievement-notification-points" id="achievementNotifPoints">+10 成就点</div>
                </div>
            </div>
        </div>

        <div class="fence-bar hidden" id="fenceBar">
            <div class="fence-post left"></div>
            <div class="fence-pickets">
            </div>
            <div class="fence-post right"></div>
            <div class="fence-rail"></div>
        </div>
    </div>
    
    <script src="js/config.js?v=20260421"></script>
    <script src="js/game.js?v=20260421"></script>
</body>
</html>
